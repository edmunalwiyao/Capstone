<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educare College Inc. Alumni Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .form-container { max-width: 800px; margin: 40px auto; background-color: white; padding: 40px; border-radius: 8px; border: 1px solid #e5e7eb; }
        label { font-size: 0.875rem; color: #374151; font-weight: 600; margin-bottom: 4px; display: block; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 1rem; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <header class="py-10">
        <h1 class="text-4xl font-extrabold tracking-tight text-center text-gray-900">
            Educare College Inc. <br><span class="text-blue-600">Alumni Tracker</span>
        </h1>
    </header>

    <main class="px-4">
        <div class="form-container shadow-md">
            <div class="mb-8 text-center border-b pb-6">
                <button type="button" onclick="alert('We are Grade 12 students from Educare College Inc. doing a study to see how our graduates are doing after finishing school. We would like to invite you to join our survey to help us learn about your jobs and experiences. Your answers will be kept private and will only be used for our school project. Thank you for your help!')" class="text-sm bg-blue-50 text-blue-700 border border-blue-200 py-2 px-4 rounded hover:bg-blue-100 transition">
                    View Privacy Notice (Consent)
                </button>
            </div>
            
            <form action="https://script.google.com/macros/s/AKfycbzedmkgdtNwxTr2Txdt6VwCwkJUWzd9XAmzQ0FU10O1Eq2yhAkp09ItAax_cUgQpPR2Yw/exec" method="POST" class="space-y-8">
                
                <section>
                    <h2 class="text-lg font-bold uppercase text-gray-800 mb-4 tracking-wider">Personal Information</h2>
                    <div class="space-y-4">
                        <div><label>Full Name</label><input type="text" name="name" required></div>
                        <div><label>Address</label><textarea name="address" rows="2"></textarea></div>
                        <div><label>Email Address</label><input type="email" name="email" required></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>Contact Number</label><input type="tel" name="phone" required></div>
                            <div><label>Sex</label>
                                <div class="flex gap-4 pt-2">
                                    <label class="flex items-center"><input type="radio" name="sex" value="male" class="w-4 h-4 mr-2"> Male</label>
                                    <label class="flex items-center"><input type="radio" name="sex" value="female" class="w-4 h-4 mr-2"> Female</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold uppercase text-gray-800 mb-4 tracking-wider">Educational Background</h2>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label>Elementary School</label><input type="text" name="elem_school"></div>
                            <div><label>Year of Graduation</label><select name="elem_year"><option value="">-- Select Year --</option>
                          
                         
                        <option>2019</option>
                        <option>2018</option>
                        <option>2017</option>
                        <option>2016</option>
                        <option>2015</option>
                        <option>2014</option>
                        <option>2013</option>
                        <option>2012</option>
                        <option>2011</option>
                        <option>2010</option>
                        <option>2009</option>
                        <option>2008</option>
                        <option>2007</option>
                        <option>2006</option>
                        <option>2005</option>
                        <option>2004</option>
                        <option>2003</option>
                        <option>2002</option>
                        <option>2001</option>
                        <option>2000</option>
                        <option>1999</option></select></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label>Junior High School</label><input type="text" name="jhs_school"></div>
                            <div><label>Year of Graduation</label><select name="jhs_year"><option value="">-- Select Year --</option>
                        <option>2024</option>        
                        <option>2023</option>
                        <option>2022</option>
                        <option>2021</option>
                        <option>2020</option>
                        <option>2019</option>
                        <option>2018</option>
                        <option>2017</option>
                        <option>2016</option>
                        <option>2015</option>
                        <option>2014</option>
                        <option>2013</option>
                        <option>2012</option>
                        <option>2011</option>
                        <option>2010</option>
                        <option>2009</option>
                        <option>2008</option>
                        <option>2007</option>
                        <option>2006</option>
                        <option>2005</option>
                        <option>2004</option>
                        <option>2003</option>
                        <option>2002</option>
                        <option>2001</option>
                        <option>2000</option>
                        <option>1999</option>
                        
                        

                    </select></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label>Senior High School</label><input type="text" value="Educare College, Inc." readonly class="bg-gray-100 text-gray-500 cursor-not-allowed"></div>
                            <div><label>Strand</label><input type="text" name="shs_strand"></div>
                            <div><label>Year of Graduation</label>
                                <select name="shs_year">
                                    <option value="">-- Select Year --</option>
                                    <option>2017</option>
                        <option>2018</option>
                        <option>2019</option>
                        <option>2020</option>
                        <option>2021</option>
                        <option>2022</option>
                        <option>2024</option>
                        <option>2025</option>
                        <option>2026</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold uppercase text-gray-800 mb-4 tracking-wider">Higher Education</h2>
                    <div class="mb-6 justify-between gap-4">
                        <h3 class="text-sm uppercase tracking-widest text-gray-400 font-bold mb-4 border-b pb-2">Undergraduate<button type="button" 
        onclick="alert('If you have attended more than one undergraduate institution, please provide the details for the school where you were last enrolled or the institution from which you earned your primary degree.')" 
        class="text-xs bg-gray-100 text-gray-600 border border-gray-200 py-1 px-3 rounded hover:bg-gray-200 transition">
        View Instructions
    </button></h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div><label>School</label><input type="text" name="grad_school"></div>
                            <div><label>Degree Program</label><input type="text" name="ug_degree"></div>
                            <div><label>Year Graduated</label><input type="text" name="ug_year" ></div>
                        </div>
                    </div>
                    <div class="mb-6">
                        <h3 class="text-sm uppercase tracking-widest text-gray-400 font-bold mb-4 border-b pb-2">Graduate School</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div><label>School</label><input type="text" name="grad_school"></div>
                            <div><label>Degree Program</label><input type="text" name="grad_degree"></div>
                            <div><label>Year Graduated</label><input type="text" name="grad_year" ></div>
                        </div>
                    </div>
                </section>

                <section>
                    <h2 class="text-lg font-bold uppercase text-gray-800 mb-4 tracking-wider">Work Experience</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div><label>Company</label><input type="text" name="work_company"></div>
                        <div><label>Position</label><input type="text" name="work_position"></div>
                        <div><label>Years in service</label><input type="number" name="work_years" placeholder="YYYY"></div>
                    </div>
                </section>

                <button type="submit" class="w-full bg-gray-200 text-gray-800 font-bold py-3 rounded hover:bg-gray-300 transition duration-300 border border-gray-300">
    Submit Registration
</button>
            </form>
        </div>
    </main>
</body>
</html>
