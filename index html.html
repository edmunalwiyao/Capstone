<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Usability Scale (SUS) Survey</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            color: #333;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }
        
        /* Centered Header Styles */
        h2 { 
            color: #2c3e50; 
            margin-bottom: 10px; 
            text-align: center; 
        }
        p.desc { 
            color: #7f8c8d; 
            margin-bottom: 30px; 
            font-size: 0.9em; 
            text-align: center; 
        }
        
        .form-group { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .form-group:last-of-type { border-bottom: none; }
        
        label.question { font-weight: 600; display: block; margin-bottom: 15px; }
        
        .scale-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: #95a5a6;
            margin-bottom: 5px;
            padding: 0 5px;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
            padding: 10px;
            border-radius: 8px;
        }
        
        .option-item { text-align: center; flex: 1; }
        .option-item input { cursor: pointer; margin-bottom: 5px; }
        .option-item span { display: block; font-size: 0.9em; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        input[type="submit"] {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background 0.3s;
        }
        input[type="submit"]:hover { background-color: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <h2>System Usability Scale</h2>
    <p class="desc">Please rate your experience from 1 (Strongly Disagree) to 5 (Strongly Agree).</p>

    <form method="post" action="https://script.google.com/macros/s/AKfycbxOw5pZQgQ4KpBEEVbrYMoLGgEhJd6hhZj3j9_Za-DZpiHlr9JVm47YP7vNj5laI-Gl5Q/exec">
        
        <div class="form-group">
            <label class="question">Full Name</label>
            <input type="text" name="name" placeholder="Enter your name here..." required>
        </div>

        <div class="form-group">
            <label class="question">1. I would use this system frequently.</label>
            <div class="scale-labels">
                <span>Strongly Disagree</span>
                <span>Strongly Agree</span>
            </div>
            <div class="options">
                <label class="option-item"><input type="radio" name="q1" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q1" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q1" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q1" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q1" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">2. I found the system unnecessarily complex.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q2" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q2" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q2" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q2" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q2" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">3. I thought the system was easy to use.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q3" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q3" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q3" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q3" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q3" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">4. I think I would need the support of a technical person to be able to use this system.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q4" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q4" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q4" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q4" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q4" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">5. I found the various functions in this system were well integrated.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q5" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q5" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q5" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q5" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q5" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">6. I thought there was too much inconsistency in this system.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q6" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q6" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q6" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q6" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q6" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">7. I would imagine that most people would learn to use this system very quickly.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q7" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q7" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q7" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q7" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q7" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">8. I found the system very cumbersome (hard) to use.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q8" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q8" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q8" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q8" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q8" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">9. I felt very confident using the system.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q9" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q9" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q9" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q9" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q9" value="5"><span>5</span></label>
            </div>
        </div>

        <div class="form-group">
            <label class="question">10. I needed to learn a lot of things before I could get going with this system.</label>
            <div class="options">
                <label class="option-item"><input type="radio" name="q10" value="1" required><span>1</span></label>
                <label class="option-item"><input type="radio" name="q10" value="2"><span>2</span></label>
                <label class="option-item"><input type="radio" name="q10" value="3"><span>3</span></label>
                <label class="option-item"><input type="radio" name="q10" value="4"><span>4</span></label>
                <label class="option-item"><input type="radio" name="q10" value="5"><span>5</span></label>
            </div>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <input type="submit" value="Submit Response">
        </div>

    </form>
</div>

</body>
</html>
