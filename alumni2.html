<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educare College Incorporated Alumni Tracker | Stay Connected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
        .form-container {
            max-width: 500px;
            background: #f3f4f6; 
        }
        input, select, textarea {
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <header class="py-10">
        <h1 class="text-4xl font-extrabold tracking-tight text-center text-gray-900">
            Educare College Incorporated <span class="text-blue-600">Alumni</span>
        </h1>
    </header>

    <main class="flex flex-col items-center justify-center px-4">
        <div class="form-container w-full p-8 rounded-xl shadow-lg border border-gray-200 bg-white">
            <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Alumni Registration</h2>
            
            <form action="https://script.google.com/macros/s/AKfycbyaW_N01MG2EkVYSwuIypysuFssbj-7USMUj9T5V72k9eC0MEoYWrxSQianrhikTcd3cg/exec" method="POST" class="space-y-4">
                
                <div>
                    <label class="block font-bold text-gray-700">Full Name</label>
                    <input type="text" name="name" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>

                <div>
                    <label class="block font-bold text-gray-700">Email Address</label>
                    <input type="email" name="email" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block font-bold text-gray-700">Phone Number</label>
                        <input type="tel" name="phone" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none" required>
                    </div>
                    <div>
                        <label class="block font-bold text-gray-700">Institution</label>
                        <input type="text" name="department" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block font-bold text-gray-700">Year of Graduation</label>
                    <select name="graduation_year" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">--Select Year--</option>
                        <option>2018</option>
                        <option>2019</option>
                        <option>2020</option>
                        <option>2021</option>
                        <option>2022</option>
                        <option>2024</option>
                        <option>2025</option>
                        <option>2026</option>
                    </select>
                </div>

                <div>
                    <label class="block font-bold text-gray-700">Current Profession</label>
                    <input type="text" name="profession" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block font-bold text-gray-700">College Degree</label>
                    <input type="text" name="profession" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block font-bold text-gray-700">Address</label>
                    <textarea name="address" rows="3" class="w-full p-2 mt-1 focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div class="text-center pt-4">
                    <button type="submit" class="w-full md:w-2/3 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-300">
                        Submit Registration
                    </button>
                </div>
            </form>
        </div>
    </main>

    <section class="container mx-auto py-16 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                <div class="text-3xl font-bold text-blue-900 mb-2">5,000+</div>
                <div class="text-gray-500 uppercase text-sm tracking-widest font-semibold">Active Members</div>
            </div>
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                <div class="text-3xl font-bold text-blue-900 mb-2">42</div>
                <div class="text-gray-500 uppercase text-sm tracking-widest font-semibold">Countries</div>
            </div>
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
                <div class="text-3xl font-bold text-blue-900 mb-2">120+</div>
                <div class="text-gray-500 uppercase text-sm tracking-widest font-semibold">Annual Meetups</div>
            </div>
        </div>
    </section>

    <section class="flex flex-col items-center justify-center pb-20 px-4">
        <h3 class="text-xl font-bold mb-4 text-gray-700">Registered Alumni Directory</h3>
        <div class="w-full max-w-5xl overflow-hidden rounded-xl shadow-lg border border-gray-200">
            <iframe src="https://docs.google.com/spreadsheets/d/1NN4fZZfRP8YyhEvv0hCCNolGcbyuA_VRt_Y48li--70/preview" class="w-full h-[600px]" frameborder="0"></iframe>
        </div>
    </section>

</body>
</html>
